<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alias Online</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    --bg: #0d0d10;
    --surface: #16161c;
    --card: #1e1e28;
    --border: #2a2a38;
    --accent: #f5c842;
    --accent2: #e8463a;
    --text: #f0f0f5;
    --muted: #6b6b82;
    --team1: #4facfe;
    --team2: #f77b72;
    --radius: 14px;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* bg texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(245,200,66,.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 90%, rgba(79,172,254,.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; width: 100%; max-width: 540px; padding: 20px 16px 40px; }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 32px 0 24px;
  }
  .logo {
    font-family: var(--font-display);
    font-size: 64px;
    letter-spacing: 6px;
    color: var(--accent);
    line-height: 1;
    text-shadow: 0 0 40px rgba(245,200,66,.3);
  }
  .logo span { color: var(--text); }
  .tagline { font-size: 13px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; gap: 16px; }
  .screen.active { display: flex; }

  /* ── CARDS ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .card-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── INPUTS ── */
  .input-row { display: flex; gap: 10px; }
  input[type=text], input[type=number], select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    padding: 12px 14px;
    width: 100%;
    outline: none;
    transition: border-color .2s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  /* ── BUTTONS ── */
  .btn {
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 600;
    padding: 14px 20px;
    transition: opacity .2s, transform .1s;
    white-space: nowrap;
  }
  .btn:hover { opacity: .88; }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #0d0d10; width: 100%; }
  .btn-ghost { background: var(--border); color: var(--text); }
  .btn-danger { background: var(--accent2); color: #fff; }
  .btn-sm { padding: 8px 14px; font-size: 13px; }

  /* ── ROOM CODE ── */
  .room-code-display {
    font-family: var(--font-display);
    font-size: 52px;
    letter-spacing: 10px;
    color: var(--accent);
    text-align: center;
    padding: 12px 0;
    text-shadow: 0 0 30px rgba(245,200,66,.25);
  }
  .room-hint { font-size: 13px; color: var(--muted); text-align: center; }

  /* ── PLAYERS LIST ── */
  .players-list { display: flex; flex-direction: column; gap: 8px; }
  .player-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border-radius: 10px;
    font-size: 14px;
  }
  .player-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #3ecf8e;
    flex-shrink: 0;
  }
  .player-badge {
    margin-left: auto;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
  .badge-host { background: rgba(245,200,66,.15); color: var(--accent); }
  .badge-t1 { background: rgba(79,172,254,.15); color: var(--team1); }
  .badge-t2 { background: rgba(247,123,114,.15); color: var(--team2); }

  /* ── TEAM SETUP ── */
  .teams-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .team-box {
    border-radius: 12px;
    padding: 14px;
    border: 1px solid var(--border);
  }
  .team-box.t1 { border-color: rgba(79,172,254,.3); background: rgba(79,172,254,.05); }
  .team-box.t2 { border-color: rgba(247,123,114,.3); background: rgba(247,123,114,.05); }
  .team-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }
  .t1 .team-label { color: var(--team1); }
  .t2 .team-label { color: var(--team2); }

  /* ── SCOREBOARD ── */
  .score-display {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
  }
  .score-num {
    font-family: var(--font-display);
    font-size: 56px;
    line-height: 1;
  }
  .score-t1 { color: var(--team1); text-align: right; }
  .score-t2 { color: var(--team2); text-align: left; }
  .score-vs { color: var(--muted); font-size: 14px; font-weight: 300; }
  .score-team-name { font-size: 12px; color: var(--muted); }
  .score-team-name.right { text-align: right; }

  /* ── TIMER ── */
  .timer-ring-wrap { display: flex; justify-content: center; padding: 8px 0; }
  svg.timer-svg { transform: rotate(-90deg); }
  .timer-text-wrap {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .timer-num {
    font-family: var(--font-display);
    font-size: 64px;
    line-height: 1;
    color: var(--text);
  }
  .timer-label { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .timer-container { position: relative; width: 180px; height: 180px; }

  /* ── WORD CARD ── */
  .word-card {
    background: linear-gradient(135deg, rgba(245,200,66,.12), rgba(245,200,66,.04));
    border: 1px solid rgba(245,200,66,.25);
    border-radius: 18px;
    padding: 28px 20px;
    text-align: center;
  }
  .current-word {
    font-family: var(--font-display);
    font-size: 52px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .word-topic {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* ── ROLE BADGE ── */
  .role-banner {
    border-radius: 12px;
    padding: 14px 18px;
    text-align: center;
  }
  .role-explainer { background: rgba(245,200,66,.1); border: 1px solid rgba(245,200,66,.2); }
  .role-guesser   { background: rgba(79,172,254,.1); border: 1px solid rgba(79,172,254,.2); }
  .role-title { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 3px; }
  .role-explainer .role-title { color: var(--accent); }
  .role-guesser .role-title { color: var(--team1); }
  .role-desc { font-size: 14px; color: var(--text); }

  /* ── ACTION BUTTONS GAME ── */
  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-correct { background: #2ecc71; color: #fff; }
  .btn-skip    { background: var(--border); color: var(--muted); }

  /* ── ROUND INFO ── */
  .round-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: var(--muted);
    padding: 2px 4px;
  }
  .round-info strong { color: var(--text); }

  /* ── WAITING ── */
  .waiting-dots::after {
    content: '...';
    animation: dots 1.2s infinite;
  }
  @keyframes dots {
    0%,20%{content:'.'} 40%,60%{content:'..'} 80%,100%{content:'...'}
  }

  /* ── RESULTS ── */
  .results-list { display: flex; flex-direction: column; gap: 8px; }
  .result-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
  }
  .result-correct { background: rgba(46,204,113,.1); border: 1px solid rgba(46,204,113,.2); }
  .result-skip    { background: rgba(107,107,130,.1); border: 1px solid rgba(107,107,130,.15); }
  .result-icon { font-size: 16px; flex-shrink: 0; }

  /* ── WINNER ── */
  .winner-banner {
    text-align: center;
    padding: 28px 20px;
    background: linear-gradient(135deg, rgba(245,200,66,.1), rgba(245,200,66,.03));
    border: 1px solid rgba(245,200,66,.2);
    border-radius: 18px;
  }
  .winner-trophy { font-size: 48px; margin-bottom: 10px; }
  .winner-name {
    font-family: var(--font-display);
    font-size: 40px;
    letter-spacing: 3px;
    color: var(--accent);
  }
  .winner-sub { font-size: 14px; color: var(--muted); margin-top: 6px; }

  /* ── SETTINGS ── */
  .settings-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .setting-block label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── CONFIG ── */
  .config-box {
    background: rgba(255,255,255,.03);
    border: 1px dashed var(--border);
    border-radius: 12px;
    padding: 16px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
  }
  .config-box code {
    color: var(--accent);
    background: rgba(245,200,66,.08);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
  }
  .config-box a { color: var(--team1); text-decoration: none; }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 12px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: var(--bg);
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 500;
    transition: transform .3s ease;
    z-index: 999;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
  }
  .dot-ok { background: #3ecf8e; }
  .dot-warn { background: var(--accent); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">ALI<span>AS</span></div>
    <div class="tagline">Play together · Online</div>
  </header>

  <!-- ── SCREEN: HOME ── -->
  <div class="screen active" id="screen-home">
    <div class="card">
      <div class="card-title">Your Name</div>
      <input type="text" id="player-name" placeholder="Enter your name" maxlength="20" />
    </div>
    <div class="card">
      <button class="btn btn-primary" onclick="createRoom()" style="margin-bottom:10px">Create Room</button>
      <div class="divider">or join existing</div>
      <br>
      <div class="input-row">
        <input type="text" id="join-code" placeholder="Room code" maxlength="6" style="text-transform:uppercase;font-family:var(--font-display);font-size:20px;letter-spacing:4px" />
        <button class="btn btn-ghost" onclick="joinRoom()">Join</button>
      </div>
    </div>

  </div>

  <!-- ── SCREEN: LOBBY ── -->
  <div class="screen" id="screen-lobby">
    <div class="card">
      <div class="card-title">Room Code</div>
      <div class="room-code-display" id="room-code-disp">----</div>
      <div class="room-hint">Share this code with your opponent</div>
      <br>
      <button class="btn btn-ghost btn-sm" onclick="copyCode()" style="width:100%">📋 Copy Code</button>
    </div>

    <div class="card">
      <div class="card-title">Players</div>
      <div class="players-list" id="lobby-players"></div>
    </div>

    <div class="card" id="lobby-settings" style="display:none">
      <div class="card-title">Game Settings</div>
      <div class="settings-row">
        <div class="setting-block">
          <label>Rounds</label>
          <select id="cfg-rounds">
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>
        </div>
        <div class="setting-block">
          <label>Timer (sec)</label>
          <select id="cfg-timer">
            <option value="45">45</option>
            <option value="60" selected>60</option>
            <option value="90">90</option>
            <option value="120">120</option>
          </select>
        </div>
      </div>
      <br>
      <div class="setting-block">
        <label>Topics</label>
        <div id="topic-checkboxes" style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px"></div>
      </div>
    </div>

    <div id="lobby-btn-wrap">
      <div id="lobby-waiting" style="text-align:center;color:var(--muted);font-size:14px;padding:8px 0">
        Waiting for opponent<span class="waiting-dots"></span>
      </div>
      <button class="btn btn-primary" id="btn-start-game" onclick="startGame()" style="display:none">Start Game →</button>
    </div>
    <button class="btn btn-ghost" onclick="leaveRoom()" style="color:var(--muted)">← Leave</button>
  </div>

  <!-- ── SCREEN: GAME ── -->
  <div class="screen" id="screen-game">
    <div class="round-info">
      <span>Round <strong id="g-round">1</strong> of <strong id="g-rounds">3</strong></span>
      <span id="g-whose-turn"></span>
    </div>

    <!-- Score -->
    <div class="card" style="padding:16px 20px">
      <div class="score-display">
        <div>
          <div class="score-num score-t1" id="g-score1">0</div>
          <div class="score-team-name right" id="g-name1">Team 1</div>
        </div>
        <div class="score-vs">vs</div>
        <div>
          <div class="score-num score-t2" id="g-score2">0</div>
          <div class="score-team-name" id="g-name2">Team 2</div>
        </div>
      </div>
    </div>

    <!-- Role -->
    <div id="g-role-banner"></div>

    <!-- Timer -->
    <div class="timer-ring-wrap">
      <div class="timer-container">
        <svg class="timer-svg" width="180" height="180" viewBox="0 0 180 180">
          <circle cx="90" cy="90" r="80" fill="none" stroke="var(--border)" stroke-width="6"/>
          <circle id="timer-arc" cx="90" cy="90" r="80" fill="none" stroke="var(--accent)"
            stroke-width="6" stroke-linecap="round"
            stroke-dasharray="502" stroke-dashoffset="0"
            style="transition:stroke-dashoffset .5s linear,stroke .5s"/>
        </svg>
        <div class="timer-text-wrap">
          <div class="timer-num" id="g-timer">60</div>
          <div class="timer-label">seconds</div>
        </div>
      </div>
    </div>

    <!-- Word (explainer only) -->
    <div id="g-word-wrap"></div>

    <!-- Action buttons -->
    <div id="g-actions"></div>

    <!-- Round results overlay -->
    <div id="g-results" style="display:none">
      <div class="card">
        <div class="card-title">This Round</div>
        <div class="results-list" id="g-results-list"></div>
      </div>
      <button class="btn btn-primary" id="btn-next-round" onclick="nextRound()" style="display:none">Next Round →</button>
      <div id="g-next-waiting" style="text-align:center;color:var(--muted);font-size:14px;padding:8px 0;display:none">
        Waiting for host<span class="waiting-dots"></span>
      </div>
    </div>
  </div>

  <!-- ── SCREEN: FINAL ── -->
  <div class="screen" id="screen-final">
    <div id="final-winner"></div>
    <div class="card" style="padding:16px 20px">
      <div class="score-display">
        <div>
          <div class="score-num score-t1" id="f-score1">0</div>
          <div class="score-team-name right" id="f-name1">Player 1</div>
        </div>
        <div class="score-vs">vs</div>
        <div>
          <div class="score-num score-t2" id="f-score2">0</div>
          <div class="score-team-name" id="f-name2">Player 2</div>
        </div>
      </div>
    </div>
    <button class="btn btn-primary" onclick="playAgain()">Play Again</button>
    <button class="btn btn-ghost" onclick="leaveRoom()" style="color:var(--muted)">← Main Menu</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  WORD BANK
// ══════════════════════════════════════════════
const WORD_BANK = {
  Animals: ['Elephant','Penguin','Crocodile','Butterfly','Octopus','Giraffe','Dolphin','Flamingo','Kangaroo','Parrot','Hedgehog','Chameleon','Cheetah','Lobster','Gorilla','Peacock','Raccoon','Jellyfish','Seahorse','Vulture'],
  Food: ['Spaghetti','Avocado','Pancake','Sushi','Burrito','Cheesecake','Pretzel','Smoothie','Lasagna','Waffle','Hummus','Croissant','Dumpling','Kebab','Milkshake','Brownie','Omelette','Nachos','Risotto','Baguette'],
  Sports: ['Basketball','Swimming','Gymnastics','Archery','Skateboard','Wrestling','Volleyball','Badminton','Snowboard','Cycling','Fencing','Handball','Surfing','Triathlon','Karate','Rowing','Polo','Bobsled','Lacrosse','Curling'],
  Travel: ['Airport','Passport','Backpack','Hostel','Suitcase','Souvenir','Lighthouse','Itinerary','Compass','Hammock','Embassy','Customs','Jetlag','Layover','Campfire','Snorkeling','Glacier','Monastery','Cruise','Hitchhike'],
  Technology: ['Keyboard','Bluetooth','Algorithm','Firewall','Hologram','Satellite','Microchip','Bandwidth','Encryption','Browser','Podcast','Charger','Screenshot','Streaming','Password','Pixel','Startup','Database','Interface','Download'],
  Movies: ['Director','Sequel','Trailer','Blockbuster','Subtitles','Premiere','Animation','Screenplay','Villain','Soundtrack','Flashback','Cliffhanger','Stuntman','Cameo','Documentary','Trilogy','Plot twist','Audition','Remake','Franchise'],
  Nature: ['Waterfall','Volcano','Tsunami','Rainbow','Thunder','Glacier','Earthquake','Mangrove','Avalanche','Tornado','Savanna','Coral reef','Northern lights','Monsoon','Quicksand','Fog','Blizzard','Tide','Eclipse','Canyon'],
  Professions: ['Surgeon','Architect','Detective','Astronaut','Journalist','Firefighter','Pharmacist','Animator','Geologist','Diplomat','Sommelier','Coroner','Curator','Puppeteer','Taxidermist','Hypnotist','Cartographer','Locksmith','Mediator','Auctioneer'],
};

const ALL_TOPICS = Object.keys(WORD_BANK);

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let sbClient = null;
let roomId = null;
let myName = '';
let isHost = false;
let subscription = null;
let timerInterval = null;
let gameState = null;
let wordQueue = [];
let roundWords = []; // words used this round with result
let timerDuration = 60;

// ══════════════════════════════════════════════
//  SUPABASE CONFIG
// ══════════════════════════════════════════════
// saveConfig removed

function initSupabase(url, key) {
  sbClient = window.supabase.createClient(url, key, { realtime: { params: { eventsPerSecond: 10 } } });
}

// clearConfig removed

// ══════════════════════════════════════════════
//  SCREENS
// ══════════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

// ══════════════════════════════════════════════
//  ROOM MANAGEMENT
// ══════════════════════════════════════════════
function genCode() {
  return Math.random().toString(36).substring(2,8).toUpperCase();
}

async function createRoom() {
  myName = document.getElementById('player-name').value.trim();
  if (!myName) { toast('Enter your name first'); return; }
  isHost = true;
  roomId = genCode();
  toast('Creating room...');

  const state = {
    phase: 'lobby',
    host: myName,
    players: [{ name: myName, team: 1 }],
    score: [0, 0],
    round: 1,
    totalRounds: 3,
    timerSec: 60,
    topics: ALL_TOPICS.slice(0, 4),
    currentWord: null,
    currentTopic: null,
    explainerIndex: 0,
    roundResults: [],
    wordQueue: [],
    timerStart: null,
  };

  try {
    const { error } = await sbClient.from('alias_rooms').insert({ id: roomId, state });
    if (error) { toast('DB error: ' + error.message); console.error(error); return; }
  } catch(e) { toast('Network error: ' + e.message); console.error(e); return; }
  subscribeRoom();
  document.getElementById('room-code-disp').textContent = roomId;
  buildTopicCheckboxes();
  document.getElementById('lobby-settings').style.display = 'block';
  showScreen('lobby');
  renderLobby(state);
}

async function joinRoom() {
  myName = document.getElementById('player-name').value.trim();
  if (!myName) { toast('Enter your name first'); return; }
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!code) { toast('Enter a room code'); return; }

  let data, error;
  try {
    const res = await sbClient.from('alias_rooms').select('state').eq('id', code).single();
    data = res.data; error = res.error;
  } catch(e) { toast('Network error: ' + e.message); return; }
  if (error || !data) { toast('Room not found: ' + (error?.message||'')); return; }

  roomId = code;
  isHost = false;
  const state = data.state;
  if (state.players.find(p => p.name === myName)) { toast('Name already taken'); return; }
  state.players.push({ name: myName, team: 2 });
  await updateState(state);
  subscribeRoom();
  document.getElementById('room-code-disp').textContent = roomId;
  showScreen('lobby');
  renderLobby(state);
}

async function updateState(state) {
  state.updated_at = new Date().toISOString();
  await sbClient.from('alias_rooms').update({ state }).eq('id', roomId);
}

function subscribeRoom() {
  subscription = sbClient
    .channel('room_' + roomId)
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'alias_rooms',
      filter: `id=eq.${roomId}`
    }, payload => {
      handleState(payload.new.state);
    })
    .subscribe();
}

function handleState(state) {
  gameState = state;
  if (state.phase === 'lobby') renderLobby(state);
  else if (state.phase === 'game') renderGame(state);
  else if (state.phase === 'round_end') renderRoundEnd(state);
  else if (state.phase === 'final') renderFinal(state);
}

async function leaveRoom() {
  if (subscription) sbClient.removeChannel(subscription);
  if (timerInterval) clearInterval(timerInterval);
  roomId = null; isHost = false; gameState = null;
  showScreen('home');
}

// ══════════════════════════════════════════════
//  LOBBY
// ══════════════════════════════════════════════
function buildTopicCheckboxes() {
  const wrap = document.getElementById('topic-checkboxes');
  wrap.innerHTML = '';
  ALL_TOPICS.forEach(t => {
    const id = 'topic_' + t;
    const checked = ['Animals','Food','Sports','Travel'].includes(t) ? 'checked' : '';
    wrap.innerHTML += `
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;color:var(--text)">
        <input type="checkbox" id="${id}" ${checked} style="accent-color:var(--accent)"> ${t}
      </label>`;
  });
}

function renderLobby(state) {
  const list = document.getElementById('lobby-players');
  list.innerHTML = '';
  state.players.forEach(p => {
    const badge = p.name === state.host
      ? `<span class="player-badge badge-host">Host</span>`
      : p.team === 1
        ? `<span class="player-badge badge-t1">Blue</span>`
        : `<span class="player-badge badge-t2">Red</span>`;
    list.innerHTML += `<div class="player-item"><div class="player-dot"></div>${p.name}${badge}</div>`;
  });

  const canStart = state.players.length >= 2;
  document.getElementById('lobby-waiting').style.display = canStart ? 'none' : 'block';
  document.getElementById('btn-start-game').style.display = (canStart && isHost) ? 'block' : 'none';
}

async function startGame() {
  const rounds = parseInt(document.getElementById('cfg-rounds').value);
  const timer = parseInt(document.getElementById('cfg-timer').value);
  const topics = ALL_TOPICS.filter(t => document.getElementById('topic_' + t)?.checked);
  if (topics.length === 0) { toast('Pick at least one topic'); return; }

  timerDuration = timer;
  const state = gameState;
  state.totalRounds = rounds;
  state.timerSec = timer;
  state.topics = topics;
  state.phase = 'game';
  state.round = 1;
  state.score = [0, 0];
  state.explainerIndex = 0;
  state.roundResults = [];
  state.wordQueue = buildWordQueue(topics);
  state.currentWord = state.wordQueue.shift();
  state.currentTopic = getTopicForWord(state.currentWord, topics);
  state.timerStart = Date.now();
  await updateState(state);
}

// ══════════════════════════════════════════════
//  GAME RENDERING
// ══════════════════════════════════════════════
function getMyTeam(state) {
  const p = state.players.find(p => p.name === myName);
  return p ? p.team : 0;
}

function getExplainer(state) {
  return state.players[state.explainerIndex % state.players.length];
}

function amExplainer(state) {
  return getExplainer(state).name === myName;
}

function renderGame(state) {
  showScreen('game');
  gameState = state;
  timerDuration = state.timerSec;

  document.getElementById('g-round').textContent = state.round;
  document.getElementById('g-rounds').textContent = state.totalRounds;
  document.getElementById('g-score1').textContent = state.score[0];
  document.getElementById('g-score2').textContent = state.score[1];

  const exp = getExplainer(state);
  const myTeam = getMyTeam(state);
  document.getElementById('g-name1').textContent = state.players.find(p=>p.team===1)?.name || 'Blue';
  document.getElementById('g-name2').textContent = state.players.find(p=>p.team===2)?.name || 'Red';
  document.getElementById('g-whose-turn').textContent = `${exp.name} explains`;

  // Role banner
  const roleBanner = document.getElementById('g-role-banner');
  if (amExplainer(state)) {
    roleBanner.innerHTML = `<div class="role-banner role-explainer"><div class="role-title">🎤 Your Role</div><div class="role-desc">Explain the word — no gestures!</div></div>`;
  } else {
    roleBanner.innerHTML = `<div class="role-banner role-guesser"><div class="role-title">👂 Your Role</div><div class="role-desc">Listen and guess the word!</div></div>`;
  }

  // Word card
  const wordWrap = document.getElementById('g-word-wrap');
  if (amExplainer(state)) {
    wordWrap.innerHTML = `
      <div class="word-card">
        <div class="current-word">${state.currentWord}</div>
        <div class="word-topic">${state.currentTopic || ''}</div>
      </div>`;
  } else {
    wordWrap.innerHTML = `
      <div class="word-card" style="text-align:center;padding:24px">
        <div style="font-family:var(--font-display);font-size:48px;color:var(--muted);letter-spacing:8px">???</div>
        <div class="word-topic" style="margin-top:6px">Listen carefully</div>
      </div>`;
  }

  // Actions
  const actions = document.getElementById('g-actions');
  if (amExplainer(state)) {
    actions.innerHTML = `
      <div class="action-row">
        <button class="btn btn-correct" onclick="markWord(true)">✓ Correct</button>
        <button class="btn btn-skip" onclick="markWord(false)">↷ Skip</button>
      </div>`;
  } else {
    actions.innerHTML = '';
  }

  // Timer
  startClientTimer(state);
  document.getElementById('g-results').style.display = 'none';
}

function startClientTimer(state) {
  if (timerInterval) clearInterval(timerInterval);
  const elapsed = Math.floor((Date.now() - state.timerStart) / 1000);
  let remaining = Math.max(0, state.timerSec - elapsed);
  updateTimerDisplay(remaining, state.timerSec);

  timerInterval = setInterval(() => {
    remaining--;
    updateTimerDisplay(remaining, state.timerSec);
    if (remaining <= 0) {
      clearInterval(timerInterval);
      if (isHost) endRound();
    }
  }, 1000);
}

function updateTimerDisplay(remaining, total) {
  document.getElementById('g-timer').textContent = remaining;
  const arc = document.getElementById('timer-arc');
  const circumference = 502;
  const offset = circumference * (1 - remaining / total);
  arc.style.strokeDashoffset = offset;
  arc.style.stroke = remaining <= 10 ? 'var(--accent2)' : remaining <= 20 ? 'var(--accent)' : 'var(--accent)';
}

// ══════════════════════════════════════════════
//  WORD ACTIONS
// ══════════════════════════════════════════════
async function markWord(correct) {
  if (!gameState || !amExplainer(gameState)) return;
  const state = gameState;
  const word = state.currentWord;
  const topic = state.currentTopic;

  // Record result
  state.roundResults = state.roundResults || [];
  state.roundResults.push({ word, topic, correct });

  // Update score
  if (correct) {
    const exp = getExplainer(state);
    const team = state.players.find(p => p.name === exp.name)?.team;
    if (team === 1) state.score[0]++;
    else state.score[1]++;
  }

  // Next word
  if (!state.wordQueue || state.wordQueue.length === 0) {
    state.wordQueue = buildWordQueue(state.topics);
  }
  state.currentWord = state.wordQueue.shift();
  state.currentTopic = getTopicForWord(state.currentWord, state.topics);

  await updateState(state);
}

async function endRound() {
  if (!gameState) return;
  const state = gameState;
  clearInterval(timerInterval);

  if (state.round >= state.totalRounds) {
    state.phase = 'final';
  } else {
    state.phase = 'round_end';
  }
  await updateState(state);
}

function renderRoundEnd(state) {
  showScreen('game');
  clearInterval(timerInterval);
  document.getElementById('g-round').textContent = state.round;
  document.getElementById('g-rounds').textContent = state.totalRounds;
  document.getElementById('g-score1').textContent = state.score[0];
  document.getElementById('g-score2').textContent = state.score[1];
  document.getElementById('g-name1').textContent = state.players.find(p=>p.team===1)?.name || 'Blue';
  document.getElementById('g-name2').textContent = state.players.find(p=>p.team===2)?.name || 'Red';
  document.getElementById('g-whose-turn').textContent = 'Round ended';
  document.getElementById('g-role-banner').innerHTML = '';
  document.getElementById('g-word-wrap').innerHTML = '';
  document.getElementById('g-actions').innerHTML = '';
  document.getElementById('timer-arc').style.strokeDashoffset = 502;
  document.getElementById('g-timer').textContent = '0';

  const results = document.getElementById('g-results');
  results.style.display = 'flex';
  results.style.flexDirection = 'column';
  results.style.gap = '10px';

  const list = document.getElementById('g-results-list');
  list.innerHTML = '';
  (state.roundResults || []).forEach(r => {
    const cls = r.correct ? 'result-correct' : 'result-skip';
    const icon = r.correct ? '✓' : '↷';
    list.innerHTML += `<div class="result-item ${cls}"><span class="result-icon">${icon}</span><span>${r.word}</span><span style="margin-left:auto;font-size:12px;color:var(--muted)">${r.topic}</span></div>`;
  });

  if (isHost) {
    document.getElementById('btn-next-round').style.display = 'block';
    document.getElementById('g-next-waiting').style.display = 'none';
  } else {
    document.getElementById('btn-next-round').style.display = 'none';
    document.getElementById('g-next-waiting').style.display = 'block';
  }
}

async function nextRound() {
  const state = gameState;
  state.phase = 'game';
  state.round++;
  state.roundResults = [];
  state.explainerIndex++;
  state.wordQueue = buildWordQueue(state.topics);
  state.currentWord = state.wordQueue.shift();
  state.currentTopic = getTopicForWord(state.currentWord, state.topics);
  state.timerStart = Date.now();
  await updateState(state);
}

function renderFinal(state) {
  showScreen('final');
  clearInterval(timerInterval);
  const p1 = state.players.find(p=>p.team===1);
  const p2 = state.players.find(p=>p.team===2);
  document.getElementById('f-score1').textContent = state.score[0];
  document.getElementById('f-score2').textContent = state.score[1];
  document.getElementById('f-name1').textContent = p1?.name || 'Blue';
  document.getElementById('f-name2').textContent = p2?.name || 'Red';

  const wrap = document.getElementById('final-winner');
  let winnerName, sub;
  if (state.score[0] > state.score[1]) {
    winnerName = p1?.name || 'Blue';
    sub = `Won with ${state.score[0]} points!`;
  } else if (state.score[1] > state.score[0]) {
    winnerName = p2?.name || 'Red';
    sub = `Won with ${state.score[1]} points!`;
  } else {
    winnerName = 'TIE!';
    sub = `Equal scores — rematch?`;
  }
  wrap.innerHTML = `
    <div class="winner-banner">
      <div class="winner-trophy">🏆</div>
      <div class="winner-name">${winnerName}</div>
      <div class="winner-sub">${sub}</div>
    </div>`;
}

async function playAgain() {
  if (!isHost) { toast('Only the host can restart'); return; }
  const state = gameState;
  state.phase = 'lobby';
  state.score = [0, 0];
  state.round = 1;
  state.roundResults = [];
  state.wordQueue = [];
  state.timerStart = null;
  await updateState(state);
}

// ══════════════════════════════════════════════
//  WORD QUEUE
// ══════════════════════════════════════════════
function buildWordQueue(topics) {
  let pool = [];
  topics.forEach(t => {
    if (WORD_BANK[t]) pool = pool.concat(WORD_BANK[t].map(w => ({ word: w, topic: t })));
  });
  // shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.map(p => p.word);
}

function getTopicForWord(word, topics) {
  for (const t of topics) {
    if (WORD_BANK[t] && WORD_BANK[t].includes(word)) return t;
  }
  return '';
}

// ══════════════════════════════════════════════

function copyCode() {
  navigator.clipboard.writeText(roomId).then(() => toast('Code copied!'));
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
